name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Compile
        run: gradle shadowJar --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: slug-bridge-dev
          path: build/libs/slug-bridge.jar
